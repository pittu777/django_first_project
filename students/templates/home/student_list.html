{% extends 'layout.html' %} {% block title %} Student List {% endblock %}
{%block content %}

<h1 class="mb-4">Students</h1>

<table class="table table-striped">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>
  </thead>

  <tbody>
    {% for student in students %}
    <tr>
      <td>{{ student.id }}</td>
      <td>{{ student.name }}</td>
      <td>{{ student.age }}</td>
      <td>{{ student.city }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="4" class="text-center">No Students Found</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
<a href="{% url 'students:home' %}" class="btn btn-outline-primary mt-3"
  >Back to Home</a
>

{% endblock %}
